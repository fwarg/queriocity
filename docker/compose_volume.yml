services:
  queriocity:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file: env.local
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - queriocity-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  queriocity-data:
