services:
  queriocity:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file: env.local
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8012:3000"
    environment:
        IMAGE_STORAGE_DIR: /images
    volumes:
      - ./data:/data
      - ./data/images:/images
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
